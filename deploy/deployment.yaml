apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt2-joke
  labels:
    app: gpt2-joke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpt2-joke
  template:
    metadata:
      labels:
        app: gpt2-joke
    spec:
      containers:
      - name: gpt2-inference
        image: gpt2jokeacr2026musti.azurecr.io/gpt2-inference:latest
        ports:
        - containerPort: 5001

        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "500m"

        # Allows model time to load (GPT2 startup)
        startupProbe:
          httpGet:
            path: /health
            port: 5001
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5

        # Pod ready for traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

        # Restart container if health fails
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: gpt2-joke-svc
spec:
  selector:
    app: gpt2-joke
  ports:
  - port: 80
    targetPort: 5001
    protocol: TCP
  type: LoadBalancer