name: Build and Deploy to AKS

"on":
    push:
        branches:
            - main
        paths:
            - "app/**"
            - "deploy/**"
            - ".github/workflows/deploy.yaml"

env:
    ACR_NAME: gpt2jokeacr2026musti
    IMAGE_NAME: gpt2-inference
    RESOURCE_GROUP: gpt2-joke-rg
    CLUSTER_NAME: gpt2-joke-aks

jobs:
    build-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Azure login
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Login to ACR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.ACR_NAME }}.azurecr.io
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./app
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
                      ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

            - name: Get AKS credentials
              run: |
                  az aks get-credentials \
                    --resource-group $RESOURCE_GROUP \
                    --name $CLUSTER_NAME \
                    --overwrite-existing

            - name: Deploy new image
              run: |
                  kubectl set image deployment/gpt2-joke \
                    gpt2-inference=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
                  kubectl rollout status deployment/gpt2-joke
